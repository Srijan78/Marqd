name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marqd-backend
          region: us-central1
          source: ./backend
          flags: |
            --add-cloudsql-instances=marqd-494514:us-central1:marqd-db
            --allow-unauthenticated
          env_vars: |
            DB_USER=postgres
            DB_PASS=${{ secrets.DB_PASSWORD }}
            DB_NAME=marqd
            DB_INSTANCE_NAME=marqd-494514:us-central1:marqd-db
            GCS_BUCKET_NAME=marqd-assets
            USE_MOCK_APIS=false
            API_KEY=${{ secrets.API_KEY }}
            SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
            YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            CORS_ORIGINS=https://marqd-frontend-691938019192.us-central1.run.app,http://localhost:5173

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Backend URL into Vite
        run: |
          echo "VITE_API_URL=${{ needs.deploy-backend.outputs.backend_url }}/api" > frontend/.env.production
          echo "VITE_API_KEY=${{ secrets.API_KEY }}" >> frontend/.env.production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marqd-frontend
          region: us-central1
          source: ./frontend
          flags: --allow-unauthenticated
